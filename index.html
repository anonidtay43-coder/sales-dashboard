<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Commission Dashboard — พ.ค.–มิ.ย. 2569</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
/* ====== (ใช้ CSS ของคุณเดิมได้เลย ไม่ต้องแก้) ====== */
body{font-family:Sarabun;background:#EEF2F8;margin:0}
.header{background:#0F1E3C;color:#fff;padding:12px}
.main{padding:12px}
.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:10px}
</style>
</head>

<body>

<div class="header">
📊 SALES COMMISSION DASHBOARD
</div>

<div class="main">

<div class="card">
<canvas id="donutChart"></canvas>
</div>

<div class="card">
<canvas id="branchComChart"></canvas>
</div>

<div class="card">
<div id="top-sellers"></div>
</div>

<div class="card">
<canvas id="sellerTargetChart"></canvas>
</div>

</div>

<script>

/* ================= DATA (ของจริงคุณ) ================= */
const RAW = [
  {b:5,n:"ขวัญ",tc:89,tg:15,lmn:0,lcn:0,lmx:400000,lcx:300,hmx:740000,hcx:600,hnc:0},
  {b:5,n:"จอย",tc:157,tg:60,lmn:1170000,lcn:1000,lmx:4880000,lcx:5050,hmx:2140000,hcx:1550},
  {b:9,n:"นุ่น",tc:62,tg:24,lmn:0,lcn:0,lmx:1000000,lcx:800,hmx:1200000,hcx:800},
  {b:10,n:"ต๊ะ",tc:94,tg:29,lmn:580000,lcn:500,lmx:1960000,lcx:2150,hmx:1350000,hcx:1000},
  {b:11,n:"เจน",tc:57,tg:27,lmn:0,lcn:0,lmx:1080000,lcx:800,hmx:1250000,hcx:950},
  {b:12,n:"ปู",tc:114,tg:58,lmn:1730000,lcn:1400,lmx:5050000,lcx:5300,hmx:2160000,hcx:1550},
  {b:13,n:"มิ้ว",tc:31,tg:17,lmn:170000,lcn:100,lmx:1110000,lcx:900,hmx:630000,hcx:500},
  {b:21,n:"บิ๊ก",tc:14,tg:6,lmn:160000,lcn:100,lmx:950000,lcx:800,hmx:80000,hcx:50}
];

/* ================= CONFIG ================= */
const C = {
  5:"#1D4ED8",
  9:"#0F766E",
  10:"#15803D",
  11:"#6D28D9",
  12:"#B45309",
  13:"#B91C1C",
  21:"#0F1E3C"
};

let charts={};
let current="all";

const sum = (arr,fn)=>arr.reduce((a,b)=>a+fn(b),0);

/* ================= FILTER ================= */
function getData(){
  return current==="all"?RAW:RAW.filter(x=>x.b==current);
}

/* ================= DONUT ================= */
function donut(){
  const d=[407,505];

  if(charts.donut) charts.donut.destroy();

  charts.donut=new Chart(donutChart,{
    type:'doughnut',
    data:{datasets:[{data:d,backgroundColor:['#1D4ED8','#0F766E']}]}
  });
}

/* ================= TOP ================= */
function top(){
  const d=[...getData()]
  .sort((a,b)=>(b.lcx+b.hcx)-(a.lcx+a.hcx))
  .slice(0,5);

  document.getElementById("top-sellers").innerHTML=
  d.map(x=>`
    <div>🏆 ${x.n} = ${(x.lcx+x.hcx).toLocaleString()}</div>
  `).join("");
}

/* ================= BRANCH ================= */
function branch(){
  const map={};

  getData().forEach(x=>{
    if(!map[x.b]) map[x.b]=0;
    map[x.b]+=x.lcx+x.hcx;
  });

  if(charts.branch) charts.branch.destroy();

  charts.branch=new Chart(branchComChart,{
    type:'bar',
    data:{
      labels:Object.keys(map).map(x=>"สาขา "+x),
      datasets:[{
        data:Object.values(map),
        backgroundColor:Object.keys(map).map(x=>C[x])
      }]
    }
  });
}

/* ================= SELLER ================= */
function seller(){
  const d=getData().slice(0,5);

  if(charts.seller) charts.seller.destroy();

  charts.seller=new Chart(sellerTargetChart,{
    type:'bar',
    data:{
      labels:d.map(x=>x.n),
      datasets:[{
        data:d.map(x=>x.lmx),
        backgroundColor:"#1D4ED8"
      }]
    }
  });
}

/* ================= MAIN ================= */
function update(){
  donut();
  top();
  branch();
  seller();
}

update();

</script>

</body>
</html>
