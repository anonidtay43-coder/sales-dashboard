<script>
const RAW = [...]; // ❗ ใช้ของเดิมคุณได้ ไม่ต้องแก้

const BRANCH_COLORS = {5:"#1D4ED8",9:"#0F766E",10:"#15803D",11:"#6D28D9",12:"#B45309",13:"#B91C1C",21:"#0F1E3C"};
const BRANCH_LIGHT  = {5:"#DBEAFE",9:"#CCFBF1",10:"#DCFCE7",11:"#EDE9FE",12:"#FEF3C7",13:"#FEE2E2",21:"#CBD5E1"};

let currentBranch = 'all';
let charts = {};

function fmt(n) {
  return n >= 1000000 ? (n/1000000).toFixed(1)+'M' :
         n >= 1000 ? (n/1000).toFixed(0)+'K' :
         n.toLocaleString('th-TH');
}
function fmtFull(n){ return n.toLocaleString('th-TH'); }

function getFiltered(){
  return currentBranch === 'all' ? RAW : RAW.filter(r => r.b === currentBranch);
}

function filterBranch(b, el){
  currentBranch = b;
  document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  updateAll();
}

/* ───────────────── KPI ───────────────── */
function updateKPI(data){
  document.getElementById('k-sellers').textContent = data.length;
  document.getElementById('k-cust').textContent =
    fmtFull(data.reduce((s,r)=>s+r.tc,0));

  const tmax = data.reduce((s,r)=>s+r.lmx+r.hmx,0);
  const tmin = data.reduce((s,r)=>s+r.lmn+(r.hmn||0),0);

  document.getElementById('k-target-max').textContent = fmt(tmax);
  document.getElementById('k-target-min').textContent = fmt(tmin);
  document.getElementById('k-target-small').textContent =
    fmt(data.reduce((s,r)=>s+r.hmx,0));

  document.getElementById('k-com-max').textContent =
    fmtFull(data.reduce((s,r)=>s+r.lcx+r.hcx,0));

  document.getElementById('k-com-min').textContent =
    fmtFull(data.reduce((s,r)=>s+r.lcn+(r.hcn||0),0));
}

/* ───────────────── GROUP ───────────────── */
function getBranchSummary(data){
  const m = {};
  data.forEach(r=>{
    if(!m[r.b]) m[r.b]={sellers:0,tc:0,tg:0,comMax:0,comMin:0};
    m[r.b].sellers++;
    m[r.b].tc+=r.tc;
    m[r.b].tg+=r.tg;
    m[r.b].comMax+=r.lcx+r.hcx;
    m[r.b].comMin+=r.lcn+(r.hcn||0);
  });
  return m;
}

/* ───────────────── DONUT ───────────────── */
function updateDonut(){
  const vals=[407,505];
  const total=913;

  if(charts.donut) charts.donut.destroy();

  charts.donut = new Chart(document.getElementById('donutChart'),{
    type:'doughnut',
    data:{
      labels:['>100K','50K–100K'],
      datasets:[{
        data:vals,
        backgroundColor:['#1D4ED8','#0F766E']
      }]
    },
    options:{
      cutout:'62%',
      plugins:{legend:{display:false}}
    }
  });
}

/* ───────────────── TOP SELLER ───────────────── */
function updateTopSellers(data){
  const sorted=[...data].sort((a,b)=>
    (b.lcx+b.hcx)-(a.lcx+a.hcx)
  ).slice(0,10);

  const max=sorted[0]?(sorted[0].lcx+sorted[0].hcx):1;

  document.getElementById('top-sellers').innerHTML =
    sorted.map((r,i)=>{
      const v=r.lcx+r.hcx;
      return `
      <div class="seller-row">
        <div class="seller-rank">${i+1}</div>
        <div class="seller-name">${r.n}</div>
        <div class="seller-bar-wrap">
          <div class="seller-bar" style="width:${(v/max)*100}%;background:${BRANCH_COLORS[r.b]}"></div>
        </div>
        <div class="seller-val">${fmtFull(v)}</div>
      </div>`;
    }).join('');
}

/* ───────────────── CHART ───────────────── */
function updateSellerChart(data){
  const s=[...data].slice(0,15);

  if(charts.seller) charts.seller.destroy();

  charts.seller = new Chart(document.getElementById('sellerTargetChart'),{
    type:'bar',
    data:{
      labels:s.map(x=>x.n),
      datasets:[
        {
          label:'Max',
          data:s.map(x=>x.lmx+x.hmx),
          backgroundColor:'#1D4ED8'
        },
        {
          label:'Min',
          data:s.map(x=>x.lmn+(x.hmn||0)),
          backgroundColor:'#1D4ED855'
        }
      ]
    },
    options:{
      indexAxis:'y'
    }
  });
}

/* ───────────────── TABLE ───────────────── */
function updateBranchTable(data){
  const m=getBranchSummary(data);

  document.getElementById('branch-tbody').innerHTML =
    Object.keys(m).map(b=>`
      <tr>
        <td>สาขา ${b}</td>
        <td>${m[b].sellers}</td>
        <td>${fmtFull(m[b].tc)}</td>
        <td>${fmtFull(m[b].tg)}</td>
        <td>${fmtFull(m[b].comMax)}</td>
        <td>${fmtFull(m[b].comMin)}</td>
      </tr>
    `).join('');
}

/* ───────────────── FIXED COM ───────────────── */
function updateBranchCom(data){
  const m=getBranchSummary(data);

  const keys=Object.keys(m);

  if(charts.branchCom) charts.branchCom.destroy();

  charts.branchCom = new Chart(
    document.getElementById('branchComChart'),
    {
      type:'bar',
      data:{
        labels:keys.map(b=>'สาขา '+b),
        datasets:[
          {
            label:'Max',
            data:keys.map(b=>m[b].comMax),
            backgroundColor:'#1D4ED8'
          },
          {
            label:'Min',
            data:keys.map(b=>m[b].comMin),
            backgroundColor:'#1D4ED855'
          }
        ]
      }
    }
  );
}

/* ───────────────── MAIN ───────────────── */
function updateAll(){
  const d=getFiltered();
  updateKPI(d);
  updateDonut(d);
  updateTopSellers(d);
  updateSellerChart(d);
  updateBranchTable(d);
  updateBranchCom(d);
}

/* 🚀 START */
updateAll();

</script>
</body>
</html>
