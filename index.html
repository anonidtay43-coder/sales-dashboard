<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Commission Dashboard — พ.ค.–มิ.ย. 2569</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
body{font-family:Sarabun;background:#EEF2F8;margin:0}
.header{background:#0F1E3C;color:#fff;padding:12px}
.main{padding:12px}
.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:10px}
canvas{max-width:100%}
</style>
</head>

<body>

<div class="header">
📊 SALES COMMISSION DASHBOARD
</div>

<div class="main">

<div class="card"><canvas id="donutChart"></canvas></div>
<div class="card"><canvas id="branchComChart"></canvas></div>
<div class="card"><div id="top-sellers"></div></div>
<div class="card"><canvas id="sellerTargetChart"></canvas></div>

</div>

<script>

/* ================= FULL RAW DATA ================= */
const RAW = [
{b:5,n:"ขวัญ",tc:89,lmx:400000,hmx:740000,lcx:300,hcx:600,lmn:0,lcn:0},
{b:5,n:"จอย",tc:157,lmx:4880000,hmx:2140000,lcx:5050,hcx:1550,lmn:1170000,lcn:1000},
{b:9,n:"นุ่น",tc:62,lmx:1000000,hmx:1200000,lcx:800,hcx:800,lmn:0,lcn:0},
{b:10,n:"ต๊ะ",tc:94,lmx:1960000,hmx:1350000,lcx:2150,hcx:1000,lmn:580000,lcn:500},
{b:11,n:"เจน",tc:57,lmx:1080000,hmx:1250000,lcx:800,hcx:950,lmn:0,lcn:0},
{b:12,n:"ปู",tc:114,lmx:5050000,hmx:2160000,lcx:5300,hcx:1550,lmn:1730000,lcn:1400},
{b:13,n:"มิ้ว",tc:31,lmx:1110000,hmx:630000,lcx:900,hcx:500,lmn:170000,lcn:100},
{b:21,n:"บิ๊ก",tc:14,lmx:950000,hmx:80000,lcx:800,hcx:50,lmn:160000,lcn:100}
];

const COLOR={
5:"#1D4ED8",9:"#0F766E",10:"#15803D",
11:"#6D28D9",12:"#B45309",13:"#B91C1C",21:"#0F1E3C"
};

let charts={};

const sum=(a,f)=>a.reduce((s,x)=>s+f(x),0);

/* ================= DONUT ================= */
function donut(){
  if(charts.d) charts.d.destroy();

  charts.d=new Chart(donutChart,{
    type:"doughnut",
    data:{
      labels:["100K+","50K–100K"],
      datasets:[{data:[407,505],backgroundColor:["#1D4ED8","#0F766E"]}]
    }
  });
}

/* ================= TOP SELLER ================= */
function top(){
  const d=[...RAW].sort((a,b)=>
    (b.lcx+b.hcx)-(a.lcx+a.hcx)
  ).slice(0,10);

  document.getElementById("top-sellers").innerHTML=
  d.map((x,i)=>`
    <div>🏆 ${i+1}. ${x.n} = ${(x.lcx+x.hcx).toLocaleString()}</div>
  `).join("");
}

/* ================= BRANCH CHART ================= */
function branch(){
  const m={};

  RAW.forEach(x=>{
    m[x.b]=(m[x.b]||0)+(x.lcx+x.hcx);
  });

  if(charts.b) charts.b.destroy();

  charts.b=new Chart(branchComChart,{
    type:"bar",
    data:{
      labels:Object.keys(m).map(x=>"สาขา "+x),
      datasets:[{
        data:Object.values(m),
        backgroundColor:Object.keys(m).map(x=>COLOR[x])
      }]
    }
  });
}

/* ================= SELLER ================= */
function seller(){
  const d=RAW.slice(0,6);

  if(charts.s) charts.s.destroy();

  charts.s=new Chart(sellerTargetChart,{
    type:"bar",
    data:{
      labels:d.map(x=>x.n),
      datasets:[{
        data:d.map(x=>x.lmx),
        backgroundColor:"#1D4ED8"
      }]
    }
  });
}

/* ================= MAIN ================= */
function update(){
  donut();
  top();
  branch();
  seller();
}

update();

</script>

</body>
</html>
