<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Commission Dashboard — พ.ค.–มิ.ย. 2569</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --navy:#0F1E3C;
  --blue:#1D4ED8;
  --teal:#0F766E;
  --green:#15803D;
  --amber:#B45309;
  --red:#B91C1C;
  --purple:#6D28D9;
  --slate:#334155;
  --light:#F1F5F9;
  --border:#E2E8F0;
  --white:#fff;
  --card-shadow:0 2px 12px rgba(15,30,60,.10);
}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sarabun',sans-serif;background:#EEF2F8;color:var(--navy);}

.header{
  background:var(--navy);
  padding:10px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:#fff;
}

.header-title{font-weight:700;}
.header-sub{font-size:.8rem;color:#94A3B8;}
.header-badge{background:var(--blue);padding:4px 12px;border-radius:20px;}

.main{padding:1rem;}

.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.8rem;}
.kpi-card{background:#fff;padding:1rem;border-radius:12px;box-shadow:var(--card-shadow);}
.kpi-label{font-size:.75rem;color:#64748B;}
.kpi-value{font-size:1.4rem;font-family:'IBM Plex Mono';font-weight:600;}

.card{background:#fff;padding:1rem;border-radius:12px;margin-top:1rem;box-shadow:var(--card-shadow);}
.card-title{font-weight:700;margin-bottom:.8rem;}
.chart-wrap{height:240px;}
.chart-wrap.tall{height:300px;}

.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;}
.filter-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);cursor:pointer;}
.filter-btn.active{background:var(--blue);color:#fff;}
</style>
</head>

<body>

<div class="header">
  <div>
    <div class="header-title">📊 SALES COMMISSION DASHBOARD</div>
    <div class="header-sub">พ.ค.–มิ.ย. 2569</div>
  </div>
  <div class="header-badge">34 เซล</div>
</div>

<div class="main">

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterBranch('all',this)">ทั้งหมด</button>
  <button class="filter-btn" onclick="filterBranch(5,this)">5</button>
  <button class="filter-btn" onclick="filterBranch(9,this)">9</button>
</div>

<div class="kpi-grid">
  <div class="kpi-card">
    <div class="kpi-label">เซลทั้งหมด</div>
    <div class="kpi-value" id="k-sellers">0</div>
  </div>

  <div class="kpi-card">
    <div class="kpi-label">ลูกค้า</div>
    <div class="kpi-value" id="k-cust">0</div>
  </div>
</div>

<div class="card">
  <div class="card-title">Donut</div>
  <div class="chart-wrap"><canvas id="donutChart"></canvas></div>
  <div id="donut-legend"></div>
</div>

<div class="card">
  <div class="card-title">Branch Commission</div>
  <div class="chart-wrap tall"><canvas id="branchComChart"></canvas></div>
</div>

</div>

<script>
const RAW = [
  {b:5,n:"A",tc:10,tg:5,lmx:1000,lmn:200,lcx:100,lcn:20,hmx:500,hcx:50},
  {b:9,n:"B",tc:20,tg:10,lmx:2000,lmn:400,lcx:200,lcn:40,hmx:800,hcx:80}
];

const COLORS = {5:"#1D4ED8",9:"#0F766E"};

let charts = {};
let currentBranch = 'all';

function fmt(n){
  return n.toLocaleString('th-TH');
}

function getData(){
  return currentBranch==='all'?RAW:RAW.filter(x=>x.b==currentBranch);
}

function filterBranch(b,el){
  currentBranch=b;
  document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  updateAll();
}

function updateKPI(data){
  document.getElementById('k-sellers').innerText=data.length;
  document.getElementById('k-cust').innerText=data.reduce((a,b)=>a+b.tc,0);
}

function updateDonut(){
  const ctx=document.getElementById('donutChart');

  if(charts.donut) charts.donut.destroy();

  charts.donut=new Chart(ctx,{
    type:'doughnut',
    data:{
      labels:['A','B'],
      datasets:[{data:[60,40],backgroundColor:['#1D4ED8','#0F766E']}]
    }
  });

  document.getElementById('donut-legend').innerHTML=`
    <div>A 60</div>
    <div>B 40</div>
  `;
}

function updateBranchCom(){
  const data=getData();

  const labels=[...new Set(data.map(x=>x.b))].map(b=>'สาขา '+b);
  const max=[100,200];
  const min=[50,80];

  if(charts.branch) charts.branch.destroy();

  charts.branch=new Chart(document.getElementById('branchComChart'),{
    type:'bar',
    data:{
      labels,
      datasets:[
        {label:'Max',data:max,backgroundColor:'#1D4ED8'},
        {label:'Min',data:min,backgroundColor:'#0F766E'}
      ]
    }
  });
}

function updateAll(){
  const data=getData();
  updateKPI(data);
  updateDonut();
  updateBranchCom();
}

updateAll();
</script>

</body>
</html>
